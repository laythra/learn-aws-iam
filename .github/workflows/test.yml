name: Vitest Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-vitest:
    name: runner / vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Vitest
        run: yarn test --run
